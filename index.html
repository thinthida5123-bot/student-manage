<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Student Portal</h1>
                <p class="text-slate-500">Manage your students efficiently</p>
            </div>
            <input type="text" id="searchInput" onkeyup="searchStudent()" placeholder="Search students..." 
                   class="px-4 py-2 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 w-full md:w-64">
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-8 flex flex-wrap gap-4">
            <input id="nameInput" placeholder="Student Name" class="flex-1 min-w-[200px] border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 ring-indigo-100">
            <input id="majorInput" placeholder="Major" class="flex-1 min-w-[200px] border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 ring-indigo-100">
            <button onclick="addStudent()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition">Add Student</button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr>
                        <th class="p-5 font-semibold text-slate-600">Name</th>
                        <th class="p-5 font-semibold text-slate-600">Major</th>
                        <th class="p-5 font-semibold text-slate-600 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTable" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
